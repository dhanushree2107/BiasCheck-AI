<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BiasCheck AI</title>
<style>
    body {
        font-family: Arial;
        background: #0f172a;
        color: white;
        text-align: center;
        padding: 50px;
    }
    textarea {
        width: 60%;
        height: 120px;
        padding: 10px;
        border-radius: 10px;
        border: none;
    }
    button {
        margin-top: 10px;
        padding: 10px 20px;
        background: #22c55e;
        border: none;
        border-radius: 8px;
        cursor: pointer;
    }
    .result {
        margin-top: 20px;
        background: #1e293b;
        padding: 20px;
        border-radius: 10px;
    }
</style>
</head>
<body>

<h1>⚖️ BiasCheck AI</h1>
<p>Check if your text contains bias</p>

<textarea id="inputText" placeholder="Paste your text here..."></textarea><br>
<button onclick="analyze()">Analyze</button>

<div class="result" id="result" style="display:none;"></div>

<script>
async function analyze() {
    const text = document.getElementById("inputText").value;

    const res = await fetch("http://127.0.0.1:5000/analyze", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ text })
    });

    const data = await res.json();

    let output = `<h2>Bias Level: ${data.score}</h2>`;

    if (data.issues.length > 0) {
        output += "<ul>";
        data.issues.forEach(issue => {
            output += `<li>${issue}</li>`;
        });
        output += "</ul>";
    } else {
        output += "<p>No bias detected 🎉</p>";
    }

    const resultDiv = document.getElementById("result");
    resultDiv.innerHTML = output;
    resultDiv.style.display = "block";
}
</script>

</body>
</html>
